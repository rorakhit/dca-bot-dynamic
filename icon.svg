<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="chart-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="inner">
      <rect x="0" y="0" width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g clip-path="url(#inner)" opacity="0.06" stroke="#f59e0b" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Chart area fill -->
  <polygon
    points="64,400 152,328 230,344 310,264 384,224 448,160 448,440 64,440"
    fill="url(#chart-fill)"
    clip-path="url(#inner)"
  />

  <!-- Chart line -->
  <polyline
    points="64,400 152,328 230,344 310,264 384,224 448,160"
    fill="none"
    stroke="url(#amber)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
    clip-path="url(#inner)"
    filter="url(#glow)"
  />

  <!-- Data point dots -->
  <circle cx="152" cy="328" r="14" fill="#0a0805"/>
  <circle cx="152" cy="328" r="9" fill="#f59e0b" opacity="0.75"/>
  <circle cx="310" cy="264" r="14" fill="#0a0805"/>
  <circle cx="310" cy="264" r="9" fill="#f59e0b" opacity="0.75"/>
  <circle cx="384" cy="224" r="14" fill="#0a0805"/>
  <circle cx="384" cy="224" r="9" fill="#f59e0b" opacity="0.75"/>

  <!-- Tip glow -->
  <circle cx="448" cy="160" r="32" fill="#f59e0b" opacity="0.12"/>
  <circle cx="448" cy="160" r="16" fill="#f59e0b" opacity="0.2"/>
  <circle cx="448" cy="160" r="10" fill="#f59e0b" filter="url(#glow)"/>

  <!-- Border -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="none" stroke="rgba(245,158,11,0.2)" stroke-width="2"/>
</svg>
