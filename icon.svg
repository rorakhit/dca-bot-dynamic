<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1508"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="amber-line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tip-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="r">
      <rect width="512" height="512" rx="116"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Neural connections — dimmer background edges -->
  <g clip-path="url(#r)" stroke="#f59e0b" stroke-width="1.5" opacity="0.12" fill="none">
    <!-- cross-connections -->
    <line x1="256" y1="96"  x2="136" y2="220"/>
    <line x1="256" y1="96"  x2="376" y2="220"/>
    <line x1="136" y1="220" x2="96"  y2="360"/>
    <line x1="136" y1="220" x2="256" y2="310"/>
    <line x1="376" y1="220" x2="256" y2="310"/>
    <line x1="376" y1="220" x2="416" y2="360"/>
    <line x1="96"  y1="360" x2="256" y2="420"/>
    <line x1="416" y1="360" x2="256" y2="420"/>
    <line x1="256" y1="310" x2="256" y2="420"/>
    <!-- extra diagonals for density -->
    <line x1="136" y1="220" x2="416" y2="360"/>
    <line x1="376" y1="220" x2="96"  y2="360"/>
    <line x1="256" y1="96"  x2="256" y2="310"/>
  </g>

  <!-- Main chart path — the "active" neural pathway, rendered as trending line -->
  <!-- Glow layer -->
  <polyline clip-path="url(#r)"
    points="96,360 136,220 256,310 376,220 416,130"
    fill="none" stroke="#f59e0b" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.08"/>
  <!-- Line -->
  <polyline clip-path="url(#r)"
    points="96,360 136,220 256,310 376,220 416,130"
    fill="none" stroke="url(#amber-line)" stroke-width="10"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Nodes -->
  <!-- Node: 96,360 -->
  <circle cx="96" cy="360" r="38" fill="url(#node-glow)" clip-path="url(#r)"/>
  <circle cx="96" cy="360" r="13" fill="#120e05" clip-path="url(#r)"/>
  <circle cx="96" cy="360" r="7" fill="#d97706" filter="url(#glow)" clip-path="url(#r)"/>

  <!-- Node: 136,220 -->
  <circle cx="136" cy="220" r="38" fill="url(#node-glow)" clip-path="url(#r)"/>
  <circle cx="136" cy="220" r="13" fill="#120e05" clip-path="url(#r)"/>
  <circle cx="136" cy="220" r="7" fill="#d97706" filter="url(#glow)" clip-path="url(#r)"/>

  <!-- Node: 256,310 -->
  <circle cx="256" cy="310" r="38" fill="url(#node-glow)" clip-path="url(#r)"/>
  <circle cx="256" cy="310" r="13" fill="#120e05" clip-path="url(#r)"/>
  <circle cx="256" cy="310" r="7" fill="#d97706" filter="url(#glow)" clip-path="url(#r)"/>

  <!-- Node: 376,220 -->
  <circle cx="376" cy="220" r="38" fill="url(#node-glow)" clip-path="url(#r)"/>
  <circle cx="376" cy="220" r="13" fill="#120e05" clip-path="url(#r)"/>
  <circle cx="376" cy="220" r="7" fill="#d97706" filter="url(#glow)" clip-path="url(#r)"/>

  <!-- Tip node: 416,130 — brightest, largest glow -->
  <circle cx="416" cy="130" r="60" fill="url(#tip-glow)" clip-path="url(#r)"/>
  <circle cx="416" cy="130" r="18" fill="#120e05" clip-path="url(#r)"/>
  <circle cx="416" cy="130" r="10" fill="#fbbf24" filter="url(#soft)" clip-path="url(#r)"/>

  <!-- Inactive nodes (off-path) — dimmer -->
  <circle cx="256" cy="96"  r="9" fill="#d97706" opacity="0.3" clip-path="url(#r)"/>
  <circle cx="96"  cy="360" r="0"/><!-- already rendered -->
  <circle cx="416" cy="360" r="9" fill="#d97706" opacity="0.3" clip-path="url(#r)"/>
  <circle cx="256" cy="420" r="9" fill="#d97706" opacity="0.3" clip-path="url(#r)"/>

  <rect width="512" height="512" rx="116" fill="none" stroke="rgba(245,158,11,0.15)" stroke-width="2"/>
</svg>
